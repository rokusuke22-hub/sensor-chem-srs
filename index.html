var STORAGE_KEY = CFG.STORAGE_KEY;
var today = function() { return new Date().toISOString().split("T")[0]; };
var addDays = function(d, n) { var x = new Date(d); x.setDate(x.getDate() + n); return x.toISOString().split("T")[0]; };
var daysBetween = function(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); };

function sm2(word, quality) {
  var t = today();
  var base = Object.assign({}, word, { lastReviewDate: t, lastQuality: quality });
  if (quality === "wrong") return Object.assign(base, { repetitions: 0, interval: 1, easeFactor: Math.max(1.3, word.easeFactor - 0.2), nextReviewDate: addDays(t, 1), graduated: false });
  if (quality === "unsure") { var iv = Math.max(1, Math.round((word.interval || 1) * 1.2)); return Object.assign(base, { repetitions: word.repetitions + 1, interval: iv, easeFactor: Math.max(1.3, word.easeFactor - 0.15), nextReviewDate: addDays(t, iv), graduated: false }); }
  var iv2; if (word.repetitions === 0) iv2 = 1; else if (word.repetitions === 1) iv2 = 6; else iv2 = Math.round((word.interval || 1) * word.easeFactor);
  if (quality === "easy") iv2 = Math.round(iv2 * 1.3);
  var ef = quality === "easy" ? word.easeFactor + 0.15 : word.easeFactor;
  return Object.assign(base, { repetitions: word.repetitions + 1, interval: iv2, easeFactor: ef, nextReviewDate: addDays(t, iv2), graduated: iv2 >= 30 });
}
function makeWord(id) { return { id: String(id).trim(), repetitions: 0, interval: 0, easeFactor: 2.5, nextReviewDate: today(), lastReviewDate: null, lastQuality: null, graduated: false, createdDate: today() }; }

var defaultSettings = { dailyLimit: 50, graduationDays: 30 };
function getGasUrl(s) { return CFG.GAS_URL || (s && s.gasUrl) || ""; }
function loadState() { try { var s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e){} return { words: {}, settings: Object.assign({}, defaultSettings) }; }
function saveState(state) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){} }
function getLocalTs() { return Number(localStorage.getItem(STORAGE_KEY + "-ts") || 0); }

// ========================================
// _cloudDirty: stateが変更されてから未pushならtrue
// pushCloudLiteはdirty=trueの場合のみ送信する。
// データ未変更でのvisibilitychange発火による無駄な
// POST（タイムスタンプだけ更新→偽ダイアログ）を防止。
// ========================================
var _cloudDirty = false;

function fetchCloud(url) {
  var rid = "fetch_" + Date.now() + "_" + Math.random().toString(36).substr(2,9);
  return fetch(url + "?action=read&_t=" + Date.now() + "&id=" + rid, { redirect: "follow" }).then(function(r){return r.json();}).then(function(d){ if(d.status==="ok") return d; throw new Error(d.message||"cloud error"); });
}
function pushCloud(url, state) {
  var ts = Date.now(), rid = "push_" + ts + "_" + Math.random().toString(36).substr(2,9);
  localStorage.setItem(STORAGE_KEY + "-ts", String(ts));
  return fetch(url, { method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({timestamp:ts, data:state, requestId:rid}) })
  .then(function(){return new Promise(function(r){setTimeout(r,1500);});})
  .then(function(){return fetch(url+"?action=read&_t="+Date.now()+"&id="+rid,{redirect:"follow"});})
  .then(function(r){return r.json();}).then(function(d){
    if(d.status==="ok"&&d.timestamp>=ts){localStorage.setItem(STORAGE_KEY+"-ts",String(d.timestamp));return d;}
    var enc=encodeURIComponent(JSON.stringify(state)); if(enc.length<7000) return fetch(url+"?action=write&ts="+ts+"&data="+enc+"&id="+rid+"&_t="+ts,{redirect:"follow"}).then(function(r2){return r2.json();});
    throw new Error("sync_verify_failed");
  });
}

// ========================================
// pushCloudLite: verify GETなしの軽量版（ページ離脱時用）
// POST送信のみ行い、結果は確認しない（fire-and-forget）。
// ========================================
function pushCloudLite(url, stateData) {
  if (!url) return;
  if (!_cloudDirty) { console.log("[pushCloudLite] skipped (no pending changes)"); return; }
  var ts = Date.now();
  var rid = "lite_" + ts + "_" + Math.random().toString(36).substr(2, 9);
  console.log("[pushCloudLite] fire-and-forget POST. id=" + rid);
  try { localStorage.setItem(STORAGE_KEY + "-ts", String(ts)); } catch(e) {}
  var payload = JSON.stringify({ timestamp: ts, data: stateData, requestId: rid });
  try {
    var useKeepalive = payload.length < 63000;
    fetch(url, {
      method: "POST", mode: "no-cors", keepalive: useKeepalive,
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: payload
    }).catch(function(err) { console.error("[pushCloudLite] " + err.message); });
  } catch(e) { console.error("[pushCloudLite] " + e.message); }
}
